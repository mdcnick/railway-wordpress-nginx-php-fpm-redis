user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    tcp_nopush on;
    tcp_nodelay on;

    # ============================================
    # FASTCGI CACHE ZONE
    # 100MB shared memory zone, 1GB max disk, 60min inactive expiry
    # Stored at /var/cache/nginx — mount a Railway Volume here!
    # ============================================
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m max_size=1g inactive=60m use_temp_path=off;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    fastcgi_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # ============================================
    # CACHE BYPASS MAP
    # Skip cache when any of these conditions are true
    # ============================================
    map "$http_cookie$request_method$http_x_requested_with$args" $cache_bypass {
        default 0;

        # Bypass for POST/PUT/DELETE requests
        "~*[A-Z]{3,}.*" 1;

        # Bypass for AJAX requests
        "~*xmlhttprequest" 1;

        # Bypass for logged-in WordPress users
        "~*wordpress_logged_in" 1;

        # Bypass for WooCommerce cart/checkout/account
        "~*woocommerce_cart_hash|woocommerce_items_in_cart|wp_woocommerce_session" 1;

        # Bypass for comment authors
        "~*comment_author" 1;

        # Bypass for WordPress admin (cookie-based detection fallback)
        "~*wordpress_[a-f0-9]+" 1;

        # Bypass query strings that indicate dynamic content
        "~*s=|cart|checkout|my-account|wc-api|add-to-cart|logout|lost-password" 1;
    }

    # Only load configs from conf.d
    include /etc/nginx/conf.d/*.conf;
}
