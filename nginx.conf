user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    tcp_nopush on;
    tcp_nodelay on;

    # ============================================
    # FASTCGI CACHE ZONE
    # Stored inside WordPress volume so it persists across deploys
    # Railway gives one volume per service at /var/www/html
    # ============================================
    fastcgi_cache_path /var/www/html/wp-content/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m max_size=1g inactive=60m use_temp_path=off;
    fastcgi_cache_key "$railway_request_scheme$request_method$host$request_uri";

    # ============================================
    # PROXY/RAILWAY SCHEME NORMALIZATION
    # Railway terminates TLS before the container. Use X-Forwarded-Proto
    # when present so PHP, WordPress file cache, and NGINX cache keys agree.
    # ============================================
    map $http_x_forwarded_proto $railway_request_scheme {
        default $scheme;
        "~*^https$" https;
        "~*^http$" http;
    }

    map $railway_request_scheme $railway_https {
        default "";
        https on;
    }

    # ============================================
    # CACHE BYPASS MAPS
    # Skip cache when any of these conditions are true.
    # ============================================
    map $request_method $cache_bypass_method {
        default 1;
        GET 0;
        HEAD 0;
    }

    map $http_x_requested_with $cache_bypass_ajax {
        default 0;
        "~*xmlhttprequest" 1;
    }

    map $http_cookie $cache_bypass_cookie {
        default 0;
        "~*wordpress_logged_in" 1;
        "~*woocommerce_cart_hash|woocommerce_items_in_cart|wp_woocommerce_session" 1;
        "~*comment_author" 1;
        "~*wordpress_[a-f0-9]+" 1;
    }

    map $request_uri $cache_bypass_uri {
        default 0;
        "~*/wp-admin" 1;
        "~*/wp-login\.php" 1;
        "~*/wp-cron\.php" 1;
        "~*/xmlrpc\.php" 1;
        "~*/wp-json" 1;
        "~*rest_route=" 1;
        "~*/cart" 1;
        "~*/checkout" 1;
        "~*/my-account" 1;
        "~*([?&]|/)wc-api" 1;
        "~*([?&]|/)add-to-cart" 1;
        "~*([?&]|/)logout" 1;
        "~*([?&]|/)lost-password" 1;
        "~*[?&]s=" 1;
    }

    map "$cache_bypass_method$cache_bypass_ajax$cache_bypass_cookie$cache_bypass_uri" $cache_bypass {
        default 1;
        "0000" 0;
    }

    # Only load configs from conf.d
    include /etc/nginx/conf.d/*.conf;
}
